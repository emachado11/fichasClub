<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>The Club</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="left-section">
      <a href="/" class="logo">
        <img src="/assets/the-club-white.png" alt="Logo">
      </a>

      <nav>
        <a href="#">Fichas</a>
        <a href="#">Campanhas</a>
      </nav>
    </div>

    <button class="login-btn">Login</button>
  </header>

  <!-- CONTEÚDO PRINCIPAL -->
  <main>

    <h1 class="top-text">
      Bem-vindo ao centro de criação do The Club
    </h1>

    <div class="center-area">

      <div class="option">
        <div class="box">
          <img src="/assets/ficha.jpg" alt="Criar Ficha">
        </div>
        <p>Criar Ficha</p>
      </div>

      <div class="option">
        <div class="box">
          <img src="/assets/campanha.jpg" alt="Criar Campanha">
        </div>
        <p>Criar Campanha</p>
      </div>

    </div>

  </main>

</body>
</html>
