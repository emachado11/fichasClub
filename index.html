<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Club - Home</title>
  <link rel="stylesheet" href="./css/styles.css">
</head>

<body class="no-scroll">

  <!-- Elemento onde o header será injetado -->
  <div id="header"></div>

  <main>
    <h1 class="top-text">
      Olá, <span id="user-nickname">Anônimo</span>.<br  >
      Bem-vindo ao centro de criação do The Club
    </h1>

    <div class="center-area">
      <div class="option">
        <div class="box">
          <img src="./assets/ficha.jpg" alt="Criar Ficha">
        </div>
        <p>Criar Ficha</p>
      </div>

      <div class="option">
        <div class="box">
          <img src="./assets/campanha.jpg" alt="Criar Campanha">
        </div>
        <p>Criar Campanha</p>
      </div>
    </div>
  </main>

  <!-- Incluir o JS para carregar o header e a lógica de autenticação -->
  <script type="module" src="./js/header.js" defer></script>
  <script type="module" src="./js/auth-state.js" defer></script>
  <script type="module" src="./js/index.js" defer></script>

</body>

</html>
