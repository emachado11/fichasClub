<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Personagem</title>

    <link rel="stylesheet" href="./css/styles.css">
    <link rel="stylesheet" href="./css/header.css">
    <link rel="stylesheet" href="./css/criar-ficha.css">
</head>

<body>

    <div id="header"></div>

    <main class="create-page">

        <div class="create-title">
            Criar um Novo Personagem
        </div>

        <div class="create-container">

            <!-- ESQUERDA -->
            <section class="create-left">

                <div class="section-title">Detalhes Principais</div>

                <div class="details-grid">

                    <!-- COLUNA 1 -->
                    <div class="col">

                        <input id="nome-input" placeholder="Nome do Personagem">

                        <!-- CLASSE -->
                        <div class="select-with-info">
                            <select id="classe-select" required></select>
                            <button type="button" class="info-btn" data-type="classe">?</button>
                        </div>

                        <!-- ORIGEM -->
                        <div class="select-with-info">
                            <select id="origem-select" required></select>
                            <button type="button" class="info-btn" data-type="origem">?</button>
                        </div>

                        <!-- NEX -->
                        <div class="nex-box">
                            <input type="number" id="nex-input" placeholder="NEX (%)" min="0" max="99">

                            <label class="nex-toggle">
                                <input type="checkbox" id="enable-level">
                                Usar Nível
                            </label>
                        </div>

                    </div>

                    <!-- COLUNA 2 -->
                    <div class="col">

                        <!-- TRILHA -->
                        <div class="select-with-info">
                            <select id="trilha-select" required></select>
                            <button type="button" class="info-btn" data-type="trilha">?</button>
                        </div>

                        <!-- NÍVEL (só aparece quando checkbox ativa) -->
                        <div class="level-box hidden" id="level-box">
                            <select id="nivel-select"></select>
                        </div>

                    </div>

                </div>

                <textarea id="historia-input" placeholder="Resumo da história..."></textarea>

            </section>

            <!-- DIREITA -->
            <section class="create-right">

                <div class="section-title">Atributos</div>

                <div class="attr-box">

                    <div class="attr-graphic">

                        <img src="./assets/atributos.png">

                        <div class="attr-overlay">
                            <div class="attr" data-attr="forca">1</div>
                            <div class="attr" data-attr="agilidade">1</div>
                            <div class="attr" data-attr="vigor">1</div>
                            <div class="attr" data-attr="presenca">1</div>
                            <div class="attr" data-attr="intelecto">1</div>
                        </div>

                    </div>

                    <div class="attr-hint">
                        Clique para aumentar • Clique direito para diminuir
                    </div>

                    <div class="attr-points">
                        Pontos restantes: <span id="attr-restantes">0</span>
                    </div>

                </div>

                <!-- SAÚDE -->
                <div class="health-box">

                    <div class="health-title">
                        Saúde

                        <label class="determinacao-toggle">
                            <input type="checkbox" id="enable-determinacao">
                            Determinação
                        </label>
                    </div>

                    <div class="health-grid">

                        <input id="vida-input" placeholder="Vida Máxima" disabled>
                        <input id="sanidade-input" placeholder="Sanidade Máxima" disabled>
                        <input id="esforco-input" placeholder="Pontos de Esforço" disabled>
                        <input id="determinacao-input" class="hidden" placeholder="Determinação" disabled>

                    </div>

                </div>

            </section>

        </div>

        <div class="create-footer">
            <button type="button" id="submit-btn">
                Criar Personagem
            </button>
        </div>

    </main>

    <!-- MODAL -->
    <div id="info-modal" class="modal hidden">
        <div class="modal-content">
            <h2 id="modal-title"></h2>
            <div id="modal-desc"></div>
            <button type="button" id="close-modal">Fechar</button>
        </div>
    </div>

    <script type="module" src="./js/header.js"></script>
    <script type="module" src="./js/criar-ficha.js"></script>

</body>

</html>
