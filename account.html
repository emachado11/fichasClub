<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minha Conta</title>
  <link rel="stylesheet" href="./css/styles.css" />
  <link rel="stylesheet" href="./css/account.css" />
  <link rel="stylesheet" href="./css/header.css">
</head>
<body class="no-scroll">
  <div id="header"></div>
  <main class="account-container">
    <!-- MENU BIOS -->
    <div class="account-menu">
      <h1 class="title">
        <span class="menu-item" id="0">&lt;</span> Minha Conta.
      </h1>
      <div class="menu-list">
        <div class="menu-item active" data-id="1"> 1 - Alterar nome de usuário </div>
        <div class="menu-item" data-id="2"> 2 - Foto de Perfil </div>
        <div class="menu-item" data-id="3"> 3 - E-mail da conta </div>
        <div class="menu-item" data-id="4"> 4 - Senha da conta </div>
        <div class="menu-item" data-id="5"> 5 - Apagar conta </div>
        <div class="menu-item" data-id="6"> 6 - Sair </div>
      </div>
    </div>

    <div class="account-position hidden">
      <label for="file-input">
        <img id="user-avatar" class="fotoDePerfil" src="" />
      </label>
      <input type="file" id="file-input" class="hidden" accept="image/*" />
      <p class="change-avatar-tip"> Clique na foto para alterá-la. </p>
    </div>

    <!-- 🔥 CROP MODAL -->
    <div id="crop-modal" class="crop-modal hidden">
      <div class="crop-box">
        <canvas id="crop-canvas"></canvas>
        <div class="crop-controls">
          <input type="range" id="zoom-slider" min="1" max="3" step="0.01" value="1" />
          <button id="crop-save">Salvar</button>
          <button id="crop-cancel">Cancelar</button>
        </div>
      </div>
    </div>
  </main>

  <!-- ================= CMD OVERLAY ================= -->
  <div id="cmd-window" class="hidden">
    <div class="cmd-titlebar">
      <div class="cmd-title">Controle de Perfil</div>
      <div class="cmd-controls">
        <span class="no-function">—</span>
        <span class="no-function">□</span>
        <span class="cmd-close">×</span>
      </div>
    </div>
    <div id="cmd-log"></div>
    <div class="cmd-input-line">
      <span>&gt; </span>
      <span id="cmd-input"></span>
      <span class="cmd-cursor">█</span>
    </div>
  </div>

  <!-- SCRIPTS -->
  <script type="module" src="./js/header.js"></script>
  <script type="module" src="./js/auth-state.js"></script>
  <script type="module" src="./js/account.js"></script>
</body>
</html>
